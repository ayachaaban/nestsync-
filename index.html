<!doctype html>
<!-- index.html is the single page the browser opens — it sets the tab title and favicon, and contains an empty <div id="root"> where React mounts the whole app via the <script> that loads main.jsx. -->
  <!--index.html loads main.jsx because HTML can't run React on its own — main.jsx is the JavaScript file that tells React to start.-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NestSync+</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
